  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Predictive Model Feature Visualization<\u002Ftitle>\n<style>/* =============================================================================\n   SalesIntel Design System — Colors & Type\n   Source of truth: SalesIntelio/contactcloud-ui (Angular Portal)\n   - Color tokens:   src/assets/scss/_colors.scss, palettes/_new-palettes.scss\n   - Type scale:     src/assets/scss/themes/_typography.scss (Golden Ditonic 1.618x)\n   - Theme vars:     src/assets/scss/themes/si-theme.scss\n   Load this file, then use the CSS variables below.\n   ============================================================================= */\n\n/* -----------------------------------------------------------------------------\n   FONTS — Nunito Sans (with Roboto / system fallback)\n   ----------------------------------------------------------------------------- */\n@font-face {\n  font-family: 'Nunito Sans';\n  src: url(\"45f79cac-71c1-40e5-8203-aae59bc0e46e\") format('truetype-variations');\n  font-weight: 300 700; font-stretch: 75% 125%; font-style: normal; font-display: swap;\n}\n@font-face {\n  font-family: 'Nunito Sans';\n  src: url(\"e943a1a9-02dd-4994-afc3-c749accd295a\") format('truetype-variations');\n  font-weight: 300 700; font-stretch: 75% 125%; font-style: italic; font-display: swap;\n}\n/* Embedded name-table aliases (same files) — keeps font-detection matching. */\n@font-face {\n  font-family: 'Nunito Sans 12pt ExtraLight';\n  src: url(\"45f79cac-71c1-40e5-8203-aae59bc0e46e\") format('truetype-variations');\n  font-weight: 300 700; font-stretch: 75% 125%; font-style: normal; font-display: swap;\n}\n@font-face {\n  font-family: 'Nunito Sans 12pt ExtraLight';\n  src: url(\"e943a1a9-02dd-4994-afc3-c749accd295a\") format('truetype-variations');\n  font-weight: 300 700; font-stretch: 75% 125%; font-style: italic; font-display: swap;\n}\n\n:root {\n  /* ===========================================================================\n     1. PRIMITIVE PALETTES (from _new-palettes.scss / _colors.scss)\n     =========================================================================== */\n\n  /* SI Dark Blue — primary brand / text / components */\n  --si-dark-blue-1000: #000B1E; /* Text Blue */\n  --si-dark-blue-900:  #00163B;\n  --si-dark-blue-800:  #002259;\n  --si-dark-blue-700:  #002D76;\n  --si-dark-blue-600:  #003894; /* Base — Indigo */\n  --si-dark-blue-500:  #3F6BB4; /* Component Blue / hyperlinks */\n  --si-dark-blue-400:  #6688BF;\n  --si-dark-blue-300:  #9CB5DF; /* Outlines & icons */\n  --si-dark-blue-200:  #CAD9F4; /* Default border */\n  --si-dark-blue-100:  #E8F0FF; /* Selected / tint */\n  --si-dark-blue-50:   #F1F6FC;\n\n  /* Brand navy — used in logo + sidebar (not in the blue ramp) */\n  --si-navy:           #1F2533; /* logomark + sidebar background */\n  --si-sidebar-bg:     #1F2233;\n\n  /* Golden Yellow — primary CTA */\n  --si-golden-500:     #4C3609;\n  --si-golden-400:     #A47514;\n  --si-golden:         #FCB41E; /* Base — Primary CTA */\n  --si-golden-200:     #FFCA5E;\n  --si-golden-100:     #FEE9BC;\n\n  /* Princeton Orange — accent (token) */\n  --si-orange:         #FC832B; /* Base accent */\n  --si-orange-700:     #CF5903;\n  --si-orange-200:     #FEE6D5;\n  --si-orange-on:      #FFF6F0;\n  /* Logo orange (brighter than token) — baked into logo SVG art ONLY.\n     Never use this directly in UI; use --si-orange (#FC832B) for any orange. */\n  --si-logo-orange:    #FF5C0A;\n\n  /* Turquoise — tertiary accent */\n  --si-turquoise:      #00BDC9;\n  --si-turquoise-700:  #0097A1;\n  --si-turquoise-200:  #CCF2F4;\n  --si-turquoise-100:  #E7FEFF;\n\n  /* Mantis — green accent */\n  --si-mantis:         #65C762;\n  --si-mantis-100:     #D1EED0;\n\n  /* Status — Green (success) */\n  --si-green-600:      #009E52; /* success */\n  --si-green-500:      #2BB970;\n  --si-green-200:      #ADF0C8;\n  --si-green-100:      #D9FAE5;\n\n  /* Status — Red (error / destructive) */\n  --si-red-600:        #D21C09; /* error / destructive */\n  --si-red-500:        #E94A3F;\n  --si-red-400:        #F86968;\n  --si-red-200:        #FFB3B3;\n  --si-red-100:        #FFD6D6;\n\n  /* Status — Yellow (warning) */\n  --si-yellow-600:     #FAD000; /* warning */\n  --si-yellow-400:     #FFEB57;\n  --si-yellow-100:     #FFFBCC;\n\n  /* Water — neutral cool surfaces */\n  --si-water:          #D6ECF9;\n  --si-water-200:      #E5F3FF;\n  --si-water-100:      #F3F9FD; /* app background */\n  --si-water-50:       #F8FCFE;\n\n  /* Base Grey ramp */\n  --si-grey-100:  #FFFFFF;\n  --si-grey-200:  #F0F2F8; /* tab / shaded */\n  --si-grey-300:  #DEE1E8;\n  --si-grey-400:  #C5CAD4;\n  --si-grey-500:  #B8BFCB;\n  --si-grey-600:  #A0A4B0;\n  --si-grey-700:  #898E9A;\n  --si-grey-800:  #6D7380;\n  --si-grey-900:  #555B6B;\n  --si-grey-1000: #3D4455;\n  --si-grey-1100: #242C40;\n  --si-grey-1200: #0C152B;\n  --si-grey-1300: #080F1E;\n\n  /* Med gray (Water 400 role) */\n  --si-med-gray:  #8B99A2;\n\n  /* Supplemental greys (per brand note — not in the SCSS palette) */\n  --si-grey-text:     #535353; /* grey body text */\n  --si-grey-disabled: #9D9D9D; /* light grey / disabled icons */\n\n  /* ===========================================================================\n     2. SEMANTIC COLOR ROLES (si-theme.scss --si-*)\n     =========================================================================== */\n  --si-text-blue:        var(--si-dark-blue-1000); /* #000B1E primary text */\n  --si-indigo:           var(--si-dark-blue-600);  /* #003894 primary brand */\n  --si-component-blue:   var(--si-dark-blue-500);  /* #3F6BB4 interactive */\n  --si-hyperlink:        var(--si-dark-blue-500);\n  --si-component-blue-selected: var(--si-dark-blue-100);\n  --si-outline-icons:    var(--si-dark-blue-300);  /* #9CB5DF */\n  --si-border-color:     var(--si-dark-blue-200);  /* #CAD9F4 default border */\n  --si-primary-cta:      var(--si-golden);         /* #FCB41E */\n  --si-primary-cta-hover:var(--si-golden-400);\n  --si-success:          var(--si-green-600);\n  --si-warning:          var(--si-yellow-600);\n  --si-error:            var(--si-red-600);\n  --si-error-destructive:var(--si-red-600);\n\n  /* App surfaces */\n  --si-bg:               #F9F9F9;             /* global page background */\n  --si-surface:          #FFFFFF;             /* cards / panels (flat) */\n  --si-surface-alt:      var(--si-grey-200);  /* shaded rows / tabs */\n\n  /* CTA gradients (from si-theme.scss CTA tokens) */\n  --si-cta-primary-grad:        linear-gradient(180deg, #FFBE37 19.71%, #E99E00 100%);\n  --si-cta-primary-grad-hover:  linear-gradient(180deg, #FFB936 8%, #E49500 100%);\n  --si-cta-primary-grad-active: linear-gradient(180deg, #FDB733 0%, #E79805 100%);\n  --si-cta-primary-label:       #0F2468;\n  --si-cta-delete-grad:         linear-gradient(180deg, #DE3219 19.71%, #A42310 100%);\n  --si-cta-delete-grad-hover:   linear-gradient(180deg, #DF381F 8%, #871D0D 100%);\n  --si-cta-secondary-border:    #95AAD8;\n  --si-cta-secondary-label:     #122C85;\n  --si-cta-secondary-bg:        rgba(255, 255, 255, 0.9333);\n  --si-cta-secondary-bg-hover:  #F2F8FC;\n  --si-cta-secondary-bg-active: #E5EDFE;\n\n  /* ===========================================================================\n     3. TYPOGRAPHY — Golden Ditonic Scale (ratio 1.618)\n        Base 14px (≤1500px). Switches to 16px base >1500px (see media query).\n     =========================================================================== */\n  --si-font-sans: 'Nunito Sans', Roboto, system-ui, -apple-system, 'Segoe UI', sans-serif;\n\n  --si-fw-light: 300;\n  --si-fw-regular: 400;\n  --si-fw-medium: 500;\n  --si-fw-bold: 600;   /* \"bold\" in this system = semibold 600 */\n  --si-fw-heavy: 700;  /* CTA labels */\n\n  --si-base-font-size: 14px;\n  --si-h1-size: 28.81px; /* 14 × 2.058 — Title */\n  --si-h2-size: 22.65px; /* 14 × 1. px\">See how the model predicts your best matches. Each category is made up of multiple features and the overall impact of the category is shown. Each square represents 1% of the model's total influence.<\u002Fp>\n    <div id=\"rhead\" style=\"align-self:stretch;display:flex;flex-direction:column\"><\u002Fdiv>\n    <div id=\"waffle\" style=\"display:grid;grid-template-columns:repeat(10,34px);gap:4px\"><\u002Fdiv>\n    <div id=\"rpanel\" style=\"display:flex;flex-direction:column;gap:6px\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"display:flex;justify-content:flex-end;padding:16px 24px;border-top:1px solid #CAD9F4;flex-shrink:0\">\n    <button id=\"footer-close\" style=\"font-size:13px;font-weight:600;padding:8px 20px;border-radius:30px;cursor:pointer;border:1px solid #95AAD8;background:rgba(255,255,255,.9333);color:#122C85;display:inline-flex;align-items:center;gap:6px;line-height:1;white-space:nowrap\">Close<\u002Fbutton>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<button id=\"reopen\" style=\"display:none;font-size:13px;font-weight:600;padding:10px 22px;border-radius:30px;cursor:pointer;border:1px solid #95AAD8;background:#fff;color:#122C85\">Open Model Visualization<\u002Fbutton>\n<\u002Fdiv>\n\n<script>\nvar ss=document.createElement('style');\nss.textContent='@keyframes spin{to{transform:rotate(360deg)}} @keyframes fadeout{0%{opacity:1}70%{opacity:1}100%{opacity:0}} .si-tbtn:hover{background:#F2F8FC} .si-cattile:hover{border-color:#9CB5DF;box-shadow:0 2px 8px rgba(2,23,68,.08)} input[type=range]{-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;outline:none;cursor:pointer} input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:16px;height:16px;border-radius:50%;background:#3F6BB4;cursor:pointer} input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:#3F6BB4;cursor:pointer;border:none} input[type=range]:disabled{cursor:default} input[type=range]:disabled::-webkit-slider-thumb{background: alse,false];\nlet isEdit=false;\nlet dirty=false;\nlet hasSaved=true;\nlet ceilTimers={};\n\n/* ---- button style helpers (SalesIntel CTA spec — large CTA = 36px) ---- */\nvar BTN_PRIMARY='height:36px;padding:0 24px;font-size:14px;font-weight:700;border-radius:30px;cursor:pointer;border:none;background:linear-gradient(180deg,#FFBE37 19.71%,#E99E00 100%);color:#0F2468;display:inline-flex;align-items:center;gap:9px;line-height:1;white-space:nowrap;transition:box-shadow .12s,background .12s';\nvar BTN_SECONDARY='font-size:13px;font-weight:600;padding:6px 14px;border-radius:30px;cursor:pointer;border:1px solid #95AAD8;background:rgba(255,255,255,.9333);color:#122C85;display:inline-flex;align-items:center;gap:6px;line-height:1;white-space:nowrap;transition:box-shadow .12s,background .12s';\nvar BTN_TEXT='height:36px;padding:0 14px;font-size:14px;font-weight:700;border-radius:3px;cursor:pointer;border:none;background:transparent;color:#021744;display:inline-flex;align-items:center;gap:9px;line-height:1;white-space:nowrap;transition:background .12s';\n\nfunction freeHeadroom(i){return W.reduce(function(s,w,j){return(j!==i&&!locked[j])?s+w:s;},0);}\n\nfunction setSliderFill(sl,val){var p=(val/100)*100;sl.style.background='linear-gradient(to right,#3F6BB4 '+p+'%,#DEE1E8 '+p+'%)';}\n\nfunction showCeiling(i){\n  var el=document.getElementById('ceil'+i);\n  if(!el)return;\n  el.style.display='flex';\n  el.style.animation='none';\n  el.offsetHeight;\n  el.style.animation='fadeout 2.5s forwards';\n  clearTimeout(ceilTimers[i]);\n  ceilTimers[i]=setTimeout(function(){el.style.display='none';},2500);\n}\n\nfunction showConfirm(msg,onYes){\n  var overlay=document.getElementById('dialog-overlay');\n  if(!overlay){\n    overlay=document.createElement('div');\n    overlay.id='dialog-overlay';\n    overlay.style.cssText='position:absolute;inset:0;background:rgba(15,18,33,0.5);display:flex;align-items:center;justify-content:center;z-index:999;padding:24px';\n    var box=document.createElement('div');\n    box.id='dialog-box';\n    box.style.cssText='background:#fff;border-radius:20px;padding:28px;max-width:440px;width:100%;display:flex;flex-direction:column;gap:22px;box-shadow:0px 16px 48px rgba(2,23,68,.18)';\n    var msg_el=document.createElement('div');\n    msg_el.id='dialog-msg';msg_el.className='si-body';\n    msg_el.style.cssText='color:#000B1E';\n    var btns=document.createElement('div');\n    btns.style.cssText='display:flex;justify-content:flex-end;gap:10px;align-items:center';\n    var nBtn=document.createElement('button');\n    nBtn.id='dialog-no';nBtn.className='si-tbtn';\n    nBtn.style.cssText='height:36px;padding:0 20px;font-size:14px;font-weight:600;border-radius:30px;cursor:pointer;border:1px solid #95AAD8;background:rgba(255,255,255,.9333);color:#122C85;display:inline-flex;align-items:center;line-height:1;white-space:nowrap;transition:background .12s';\n    nBtn.textContent='Cancel';\n    var yBtn=document.createElement('button');\n    yBtn.id='dialog-yes';\n    yBtn.style.cssText=BTN_PRIMARY;\n    yBtn.textContent='Confirm';\n    btns.appendChild(nBtn);btns.appendChild(yBtn);\n    box.appendChild(msg_el);box.appendChild(btns);\n    overlay.appendChild(box);\n    (document.getElementById('modal-card')||document.body).appendChild(overlay);\n  }\n  document.getElementById('dialog-msg').textContent=msg;\n  overlay.style.display='flex';\n  var yc=document.getElementById('dialog-yes').cloneNode(true);\n  var nc=document.getElementById('dialog-no').cloneNode(true);\n  document.getElementById('dialog-yes').replaceWith(yc);\n  document.getElementById('dialog-no').replaceWith(nc);\n  yc.addEventListener('click',function(){overlay.style.display='none';onYes();},{once:true});\n  nc.addEventListener('click',function(){overlay.style.display='none';},{once:true});\n}\n\nfunction mkbtn(html,onclick,style,cls){\n  var b=document.createElement('button');\n  b.style.cssText=style;b.innerHTML=html;\n  if(cls)b.className=cls;\n  b.addEventListener('click',onclick);\n  return b;\n}\n\nfunction showTip(target,text){\n  var tip=document.getElementById('si-tip');\n  if(!tip){\n    tip=document.createElement('div');\n    tip.id='si-tip';\n    tip.style.cssText='position:absolute;z-index:1000;max-width:220px;background:#021744;color:#fff;font-size:12px;line-height:1.45;padding:8px 11px;border-radius:8px;box-shadow:0 6px 20px rgba(2,23,68,.30);pointer-events:none;opacity:0;transition:opacity .1s';\n    (document.getElementById('modal-card')||document.body).appendChild(tip);\n  }\n  tip.textContent=text;\n  tip.style.display='block';\n  var card=document.getElementById('modal-card');\n  var cr=card.getBoundingClientRect();\n  var br=target.getBoundingClientRect();\n  var top=br.top-cr.top-tip.offsetHeight-8;\n  if(top<6)top=br.bottom-cr.top+8;\n  var left=br.left+br.width/2-cr.left-tip.offsetWidth/2;\n  left=Math.max(8,Math.min(left,card.clientWidth-tip.offsetWidth-8));\n  tip.style.top=top+'px';tip.style.left=left+'px';\n  requestAnimationFrame(function(){tip.style.opacity='1';});\n}\nfunction hideTip(){var tip=document.getElementById('si-tip');if(tip){tip.style.opacity='0';tip.style.display='none';}}\n\nfunction renderHeader(){\n  var hdr=document.getElementById('hdr');\n  hdr.innerHTML='';\n  if(!isEdit){\n    if(hasSaved)hdr.appendChild(mkbtn(svgIcon('restore')+' Restore Original',restoreOriginal,BTN_TEXT,'si-tbtn'));\n    hdr.appendChild(mkbtn(svgIcon('adjust')+' Adjust Weights',enterEdit,BTN_PRIMARY));\n  } else {\n    hdr.appendChild(mkbtn('Save Changes',trySave,BTN_PRIMARY));\n    hdr.appendChild(mkbtn('Discard',discard,BTN_TEXT,'si-tbtn'));\n  }\n  var x=document.createElement('button');\n  x.style.cssText='width:32px;height:32px;border:none;background:none;cursor:pointer;color:#8B99A2;display:inline-flex;align-items:center;justify-content:center;border-radius:8px';\n  x.innerHTML=svgIcon('close',18);\n  x.setAttribute('aria-label','Close');\n  x.addEventListener('mouseenter',function(){x.style.background='#E5F3FF';});\n  x.addEventListener('mouseleave',function(){x.style.background='none';});\n  x.addEventListener('click',closeModal);\n  hdr.appendChild(x);\n}\n\nfunction buildWaffle(){\n  var el=document.getElementById('waffle');el.innerHTML='';\n  var sq=[];\n  WORDER.forEach(function(i){var n=Math.round(W[i]);for(var j=0;j<n;j++)sq.push(COLORS[i]);});\n  while(sq.length<100)sq.push('#DEE1E8');\n  sq.slice(0,100).forEach(function(c){var d=document.createElement('div');d.style.cssText='width:34px;height:34px;border-radius:6px;background:'+c;el.appendChild(d);});\n}\n\nfunction buildTiles(){\n  var container=document.getElementById('tiles');\n  if(!container)return;\n  container.innerHTML='';\n  var uCount=locked.filter(function(l){return !l;}).length;\n  NAMES.forEach(function(name,i){\n    var onlyOne=!locked[i]&&uCount===1;\n    var isDisabled=locked[i]||onlyOne;\n    var wrap=document.createElement('div');\n    if(!isEdit){\n      wrap.className='si-cattile';\n      wrap.style.cssText='display:flex;align-items:center;gap:14px;height:70px;padding:0 18px 0 14px;border:1px solid #CAD9F4;border-radius:8px;background:#fff;cursor:pointer;box-sizing:border-box;transition:box-shadow .12s,border-color .12s';\n      var bar=document.createElement('div');\n      bar.style.cssText='width:3px;align-self:stretch;margin:15px 0;border-radius:2px;flex-shrink:0;background:'+INK[i];\n      var vlbl=document.createElement('span');\n      vlbl.style.cssText='font-size:var(--si-body-size);font-weight:700;color:#000B1E;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';\n      vlbl.textContent=name;\n      var vpct=document.createElement('span');\n      vpct.id='pct'+i;vpct.style.cssText='font-size:var(--si-body-size);font-weight:700;flex-shrink:0;color:'+INK[i];\n      vpct.textContent=W[i].toFixed(1)+'%';\n      var chev=document.createElement('span');\n      chev.style.cssText='color:#9CB5DF;display:inline-flex;flex-shrink:0';\n      chev.innerHTML=svgIcon('chevron',18);\n      wrap.appendChild(bar);wrap.appendChild(vlbl);wrap.appendChild(vpct);wrap.appendChild(chev);\n      container.appendChild(wrap);\n      return;\n    }\n    wrap.style.cssText='border:1px solid #9CB1D6;border-radius:8px;padding:12px 16px;background:white;min-height:70px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;opacity:'+(onlyOne?'0.4':'1');\n    var top=document.createElement('div');\n    top.style.cssText='display:flex;align-items:center;gap:7px';\n    var dot=document.createElement('div');\n    dot.style.cssText='width:8px;height:8px;border-radius:50%;flex-shrink:0;background:'+COLORS[i];\n    var lbl=document.createElement('span');\n    lbl.style.cssText='font-size:var(--si-body-size);color:#000B1E;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';\n    lbl.textContent=name;\n    var pct=document.createElement('span');\n    pct.id='pct'+i;pct.style.cssText='font-size:var(--si-body-size);font-weight:600;color:#000B1E;flex-shrink:0';\n    pct.textContent=W[i].toFixed(1)+'%';\n    top.appendChild(dot);top.appendChild(lbl);top.appendChild(pct);\n    if(isEdit){\n      var lb=document.createElement('button');\n      lb.style.cssText='background:none;border:none;cursor:pointer;padding:3px 5px;border-radius:6px;display:inline-flex;align-items:center;transition:background .12s;color:'+(locked[i]?'#003894':'#9CB5DF');\n      lb.innerHTML=svgIcon(locked[i]?'lock':'unlock',15);\n      lb.setAttribute('aria-label',(locked[i]?'Unlock':'Lock')+' '+name);\n      var tipTxt=locked[i]?'Unlocking this category allows weights to be adjusted.':'Lock this category to freeze the current weights.';\n      lb.addEventListener('mouseenter',function(){lb.style.background='#E5F3FF';showTip(lb,tipTxt);});\n      lb.addEventListener('mouseleave',function(){lb.style.background='none';hideTip();});\n      (function(idx){lb.addEventListener('click',function(){hideTip();toggleLock(idx);});})(i);\n      top.appendChild(lb);\n    }\n    wrap.appendChild(top);\n    if(isEdit){\n      var sl=document.createElement('input');\n      sl.type='range';sl.min=0;sl.max=100;sl.step=0.1;sl.value=W[i].toFixed(1);\n      sl.id='sl'+i;sl.style.cssText='width:100%;display:block;margin-top:8px';\n      if(isDisabled){sl.disabled=true;}\n      setSliderFill(sl,W[i]);\n      if(!isDisabled){(function(idx){sl.addEventListener('input',function(){onSlide(idx,parseFloat(this.value));});})(i);}\n      wrap.appendChild(sl);\n      var ceilMsg=document.createElement('div');\n      ceilMsg.id='ceil'+i;\n      ceilMsg.style.cssText='display:none;align-items:center;gap:4px;margin-top:5px;font-size:11px;color:#A47514';\n      ceilMsg.innerHTML=svgIcon('warning',12)+' Max limit reached. Unlock other categories to increase further.';\n      wrap.appendChild(ceilMsg);\n      if(onlyOne){\n        var h=document.createElement('div');\n        h.style.cssText='font-size:11px;color:#8B99A2;margin-top:4px';\n        h.textContent='Unlock at least one other category to adjust this one.';\n        wrap.appendChild(h);\n      }\n    }\n    container.appendChild(wrap);\n  });\n}\n\nfunction toggleLock(i){locked[i]=!locked[i];buildTiles();}\n\nfunction onSlide(i,nv){\n  var headroom=freeHeadroom(i);\n  var ceiling=Math.round((W[i]+headroom)*10)/10;\n  var atCeiling=nv>=ceiling;\n  nv=Math.min(Math.round(nv*10)/10,ceiling);\n  var sl=document.getElementById('sl'+i);\n  if(sl){sl.value=nv;setSliderFill(sl,nv);}\n  if(atCeiling)showCeiling(i);\n  var diff=nv-W[i];\n  if(Math.abs(diff)<0.01)return;\n  var free=[];\n  W.forEach(function(_,j){if(j!==i&&!locked[j])free.push(j);});\n  if(!free.length)return;\n  var freeSum=free.reduce(function(s,j){return s+W[j];},0);\n  if(freeSum<=0)return;\n  free.forEach(function(j){var share=W[j]/freeSum;W[j]=Math.max(0,Math.round((W[j]-diff*share)*10)/10);});\n  W[i]=nv;\n  var sum=W.reduce(function(a,b){return a+b;},0);\n  var err=100-sum;\n  if(Math.abs(err)>0.01){W[free[free.length-1]]=Math.max(0,Math.round((W[free[free.length-1]]+err)*10)/10);}\n  NAMES.forEach(function(_,j){\n    if(j===i)return;\n    var p=document.getElementById('pct'+j);if(p)p.textContent=W[j].toFixed(1)+'%';\n    var s=document.getElementById('sl'+j);if(s&&!locked[j]){s.value=W[j];setSliderFill(s,W[j]);}\n  });\n  var pi=document.getElementById('pct'+i);if(pi)pi.textContent=W[i].toFixed(1)+'%';\n  buildWaffle();updateTotal();markStale();dirty=true;\n}\n\nfunction updateTotal(){\n  var el=document.getElementById('tv');if(!el)return;\n  var t=Math.round(W.reduce(function(a,b){return a+b;},0)*10)/10;\n  el.textContent=t.toFixed(1)+'%';\n  el.style.color=Math.abs(t-100)<0.2?'#009E52':'#D21C09';\n}\n\nfunction markStale(){var r=document.getElementById('p-res');if(r&&r.style.display!=='none')r.style.opacity='0.4';}\n\nfunction renderRight(){\n  var rh=document.getElementById('rhead');rh.innerHTML='';\n  var rp=document.getElementById('rpanel');rp.innerHTML='';\n  if(!isEdit){\n    var hint=document.createElement('div');hint.style.cssText='font-size:var(--si-body-size);line-height:var(--si-line-body);color:#535353;margin-bottom:6px';hint.textContent='Select a category to see how it influences the model.';rh.appendChild(hint);\n    var ti=document.createElement('div');\n    ti.style.cssText='font-size:var(--si-body-size);line-height:var(--si-line-body);color:#535353;text-align:right;margin-top:auto';\n    var tsum=Math.round(W.reduce(function(a,b){return a+b;},0)*10)/10;\n    ti.textContent='Total Impact: '+tsum+'%';rh.appendChild(ti);\n    var tiles=document.createElement('div');tiles.id='tiles';tiles.style.cssText='display:flex;flex-direction:column;gap:6px';rp.appendChild(tiles);\n  } else {\n    var dir=document.createElement('div');\n    dir.className='si-body';\n    dir.style.cssText='color:#535353';\n    dir.textContent='Adjust weights below, then run a preview to see how your top accounts shift.';\n    rh.appendChild(dir);\n    var tr=document.createElement('div');\n    tr.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:8px 11px;border-radius:8px;background:#F0F2F8;flex-shrink:0;margin-top:auto';\n    tr.innerHTML='<span style=\"font-size:13px;color:#8B99A2\">Total<\u002Fspan><span id=\"tv\" style=\"font-size:13px;font-weight:600;color:#009E52\">100.0%<\u002Fspan>';\n    rh.appendChild(tr);\n    var tiles2=document.createElement('div');tiles2.id='tiles';tiles2.style.cssText='display:flex;flex-direction:column;gap:6px';rp.appendChild(tiles2);\n    var pw=document.createElement('div');pw.style.cssText='padding-top:12px;margin-top:6px;border-top:1px solid #CAD9F4';\n    var plbl=document.createElement('div');plbl.style.cssText='font-size:11px;font-weight:600;color:#8B99A2;letter-spacing:0.04em;text-transform:uppercase;margin-bottom:8px';plbl.textContent='Preview Results';pw.appendChild(plbl);\n    var load=document.createElement('div');load.id='p-load';load.style.cssText='display:none;text-align:center;padding:12px 0';\n    load.innerHTML='<div style=\"width:18px;height:18px;border:2px solid #DEE1E8;border-top-color:#3F6BB4;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 6px\"><\u002Fdiv><span style=\"font-size:12px;color:#8B99A2\">Scoring top accounts...<\u002Fspan>';pw.appendChild(load);\n    var res=document.createElement('div');res.id='p-res';res.style.display='none';pw.appendChild(res);\n    var rb=document.createElement('button');rb.id='run-btn';rb.className='si-tbtn';\n    rb.style.cssText='margin-top:10px;'+BTN_TEXT;\n    rb.innerHTML=svgIcon('play')+' Run Preview';\n    rb.addEventListener('click',runPreview);pw.appendChild(rb);\n    rp.appendChild(pw);updateTotal();\n  }\n  buildTiles();\n}\n\nfunction runPreview(){\n  var idle=document.getElementById('p-idle'),load=document.getElementById('p-load'),res=document.getElementById('p-res'),rb=document.getElementById('run-btn');\n  if(idle)idle.style.display='none';\n  if(res){res.style.display='none';res.style.opacity='1';}\n  if(load)load.style.display='block';\n  if(rb)rb.style.display='none';\n  setTimeout(function(){\n    if(load)load.style.display='none';\n    var cos=[{n:'Salesforce',b:94,a:97},{n:'HubSpot',b:91,a:95},{n:'ServiceNow',b:87,a:91},{n:'Clari',b:72,a:86,isNew:true},{n:'Workday',b:89,a:88},{n:'Zendesk',b:85,a:82},{n:'Gong',b:80,a:84},{n:'Intercom',b:83,a:79},{n:'Outreach',b:78,a:76},{n:'Drift',b:75,a:71}];\n    var sorted=[...cos].sort(function(x,y){return y.a-x.a;});\n    var rows=sorted.map(function(co,i){\n      var br=cos.indexOf(co)+1,d=br-(i+1),ch='';\n      if(co.isNew)ch='<span style=\"font-size:10px;padding:1px 5px;border-radius:50px;background:#E8F0FF;color:#003894;font-weight:600\">New<\u002Fspan>';\n      else if(d>0)ch='<span style=\"font-size:10px;padding:1px 5px;border-radius:50px;background:#D9FAE5;color:#00672E;font-weight:600\">+'+d+'<\u002Fspan>';\n      else if(d<0)ch='<span style=\"font-size:10px;padding:1px 5px;border-radius:50px;background:#FFD6D6;color:#920000;font-weight:600\">'+d+'<\u002Fspan>';\n      else ch='<span style=\"color:#8B99A2\">&#8212;<\u002Fspan>';\n      return '<tr><td style=\"padding:4px 6px;font-size:11px;color:#8B99A2;font-variant-numeric:tabular-nums\">'+(i+1)+'<\u002Ftd><td style=\"padding:4px 6px;font-size:11px;color:#000B1E\">'+co.n+'<\u002Ftd><td style=\"padding:4px 6px;font-size:11px;color:#8B99A2;font-variant-numeric:tabular-nums\">'+co.b+'<\u002Ftd><td style=\"padding:4px 6px;font-size:11px;font-weight:600;color:#000B1E;font-variant-numeric:tabular-nums\">'+co.a+'<\u002Ftd><td style=\"padding:4px 6px\">'+ch+'<\u002Ftd><\u002Ftr>';\n    }).join('');\n    if(res){res.style.display='';res.innerHTML='<table style=\"width:100%;border-collapse:collapse\"><thead><tr><th style=\"font-size:10px;font-weight:600;color:#003894;padding:3px 6px;text-align:left;border-bottom:1px solid #DEE1E8\">#<\u002Fth><th style=\"font-size:10px;font-weight:600;color:#003894;padding:3px 6px;text-align:left;border-bottom:1px solid #DEE1E8\">Company<\u002Fth><th style=\"font-size:10px;font-weight:600;color:#003894;padding:3px 6px;text-align:left;border-bottom:1px solid #DEE1E8\">Before<\u002Fth><th style=\"font-size:10px;font-weight:600;color:#003894;padding:3px 6px;text-align:left;border-bottom:1px solid #DEE1E8\">After<\u002Fth><th style=\"border-bottom:1px solid #DEE1E8\"><\u002Fth><\u002Ftr><\u002Fthead><tbody>'+rows+'<\u002Ftbody><\u002Ftable>';}\n    if(rb)rb.style.display='';\n  },1500);\n}\n\nfunction enterEdit(){isEdit=true;dirty=false;renderHeader();renderRight();}\n\nfunction trySave(){\n  var doSave=function(){hasSaved=true;dirty=false;isEdit=false;locked=locked.map(function(){return false;});renderHeader();renderRight();buildWaffle();};\n  IS_PRIMARY?showConfirm('This is your primary model. Saving will affect all services using it, including RepIntel scores and enrichment jobs.',doSave):doSave();\n}\n\nfunction discard(){\n  var doDiscard=function(){W=[...ORIG];locked=locked.map(function(){return false;});isEdit=false;dirty=false;renderHeader();renderRight();buildWaffle();};\n  dirty?showConfirm('Discard your weight changes? This cannot be undone.',doDiscard):doDiscard();\n}\n\nfunction restoreOriginal(){\n  showConfirm('Restore the original trained weights? This will overwrite your saved changes.',function(){\n    W=[...ORIG];locked=locked.map(function(){return false;});hasSaved=false;renderHeader();renderRight();buildWaffle();\n  });\n}\n\nfunction closeModal(){document.getElementById('modal-card').style.display='none';document.getElementById('reopen').style.display='inline-flex';}\ndocument.getElementById('footer-close').addEventListener('click',closeModal);\ndocument.getElementById('reopen').addEventListener('click',function(){document.getElementById('modal-card').style.display='';this.style.display='none';});\n\nrenderHeader();buildWaffle();renderRight();\n<\u002Fscript>\n\n\n\n<style id=\"__om-edit-overrides\">\n<\u002Fstyle>\n<\u002Fbody><\u002Fhtml>"
